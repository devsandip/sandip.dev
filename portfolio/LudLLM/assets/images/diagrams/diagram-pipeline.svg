<svg viewBox="0 0 760 960" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#9aa3b2"/>
    </marker>
    <style>
      .panel{fill:#f6f8fc;stroke:#d7deea;stroke-width:1.5;rx:14;}
      .card{fill:#ffffff;stroke:#cfd6e4;stroke-width:1.5;}
      .h{fill:#1d2330;font-weight:700;}
      .t{fill:#2b3344;}
      .m{fill:#6b7384;}
      .chip{fill:#ffffff;stroke:#c3ccdd;stroke-width:1.3;}
      .lbl{fill:#39414f;font-weight:600;}
      .flow{stroke:#9aa3b2;stroke-width:2;fill:none;}
      .badge{fill:#eef4ff;stroke:#bcd0f0;stroke-width:1.2;}
      .bt{fill:#2c5b96;font-weight:600;}
    </style>
  </defs>

  <!-- input -->
  <rect x="200" y="24" width="360" height="62" rx="14" class="card"/>
  <text x="380" y="50" text-anchor="middle" font-size="16" class="h">A paragraph of premise</text>
  <text x="380" y="72" text-anchor="middle" font-size="13" class="m">plus the one secret the book should hide and when to reveal it</text>
  <path d="M380 86 L380 116" class="flow" marker-end="url(#arr)"/>

  <!-- SETUP panel -->
  <rect x="40" y="120" width="680" height="240" rx="16" class="panel"/>
  <text x="64" y="150" font-size="15" class="h">SETUP</text>
  <text x="116" y="150" font-size="13" class="m">you read and approve each step before the next one runs</text>
  <!-- five chips -->
  <g>
    <rect x="64" y="172" width="120" height="58" rx="11" class="chip"/>
    <text x="124" y="198" text-anchor="middle" font-size="13.5" class="lbl">tidy up</text>
    <text x="124" y="216" text-anchor="middle" font-size="11.5" class="m">the brief</text>

    <rect x="196" y="172" width="120" height="58" rx="11" class="chip"/>
    <text x="256" y="198" text-anchor="middle" font-size="13.5" class="lbl">build world</text>
    <text x="256" y="216" text-anchor="middle" font-size="11.5" class="m">plot + secrets</text>

    <rect x="328" y="172" width="120" height="58" rx="11" class="chip"/>
    <text x="388" y="198" text-anchor="middle" font-size="13.5" class="lbl">build cast</text>
    <text x="388" y="216" text-anchor="middle" font-size="11.5" class="m">who knows what</text>

    <rect x="460" y="172" width="120" height="58" rx="11" class="chip"/>
    <text x="520" y="198" text-anchor="middle" font-size="13.5" class="lbl">structure</text>
    <text x="520" y="216" text-anchor="middle" font-size="11.5" class="m">acts + reveals</text>

    <rect x="592" y="172" width="104" height="58" rx="11" class="chip"/>
    <text x="644" y="198" text-anchor="middle" font-size="13.5" class="lbl">outline</text>
    <text x="644" y="216" text-anchor="middle" font-size="11.5" class="m">chapters</text>
  </g>
  <!-- little connecting arrows between chips -->
  <path d="M184 201 L196 201" class="flow" marker-end="url(#arr)"/>
  <path d="M316 201 L328 201" class="flow" marker-end="url(#arr)"/>
  <path d="M448 201 L460 201" class="flow" marker-end="url(#arr)"/>
  <path d="M580 201 L592 201" class="flow" marker-end="url(#arr)"/>
  <!-- critic badge -->
  <rect x="64" y="250" width="632" height="86" rx="12" class="badge"/>
  <text x="84" y="278" font-size="13.5" class="bt">A second reader checks every step</text>
  <text x="84" y="300" font-size="12.5" class="t">A different AI (a separate family from the one writing) grades each step on its own merits</text>
  <text x="84" y="320" font-size="12.5" class="t">and flags anything weak. It advises you. It never overrules you.</text>

  <path d="M380 360 L380 392" class="flow" marker-end="url(#arr)"/>

  <!-- WRITER panel -->
  <rect x="40" y="396" width="680" height="170" rx="16" class="panel"/>
  <text x="64" y="426" font-size="15" class="h">WRITER</text>
  <text x="130" y="426" font-size="13" class="m">about forty chapters, one at a time</text>
  <g>
    <rect x="86" y="452" width="150" height="58" rx="11" class="chip"/>
    <text x="161" y="478" text-anchor="middle" font-size="13.5" class="lbl">draft a chapter</text>
    <text x="161" y="496" text-anchor="middle" font-size="11.5" class="m">only what the POV knows</text>

    <rect x="305" y="452" width="150" height="58" rx="11" class="chip"/>
    <text x="380" y="478" text-anchor="middle" font-size="13.5" class="lbl">check it</text>
    <text x="380" y="496" text-anchor="middle" font-size="11.5" class="m">no early leaks</text>

    <rect x="524" y="452" width="150" height="58" rx="11" class="chip"/>
    <text x="599" y="478" text-anchor="middle" font-size="13.5" class="lbl">record changes</text>
    <text x="599" y="496" text-anchor="middle" font-size="11.5" class="m">who learned what</text>
  </g>
  <path d="M236 481 L305 481" class="flow" marker-end="url(#arr)"/>
  <path d="M455 481 L524 481" class="flow" marker-end="url(#arr)"/>
  <!-- loop arrow back -->
  <path d="M599 510 L599 540 L161 540 L161 510" class="flow" marker-end="url(#arr)"/>
  <text x="380" y="556" text-anchor="middle" font-size="11.5" class="m">repeat for the next chapter, carrying forward everything the cast now believes</text>

  <path d="M380 566 L380 598" class="flow" marker-end="url(#arr)"/>

  <!-- FINISHING -->
  <rect x="40" y="602" width="680" height="96" rx="16" class="panel"/>
  <text x="64" y="632" font-size="15" class="h">FINISHING</text>
  <text x="152" y="632" font-size="13" class="m">built last, from the final book</text>
  <rect x="180" y="648" width="180" height="36" rx="9" class="chip"/>
  <text x="270" y="671" text-anchor="middle" font-size="13" class="lbl">character dossiers</text>
  <rect x="400" y="648" width="200" height="36" rx="9" class="chip"/>
  <text x="500" y="671" text-anchor="middle" font-size="13" class="lbl">interactive story map</text>

  <path d="M380 698 L380 730" class="flow" marker-end="url(#arr)"/>

  <!-- output -->
  <rect x="200" y="734" width="360" height="64" rx="14" class="card"/>
  <text x="380" y="760" text-anchor="middle" font-size="16" class="h">A finished novel</text>
  <text x="380" y="782" text-anchor="middle" font-size="13" class="m">a bound PDF, plus an interactive map of who knew what, when</text>

  <!-- footnote -->
  <text x="380" y="838" text-anchor="middle" font-size="12.5" class="m">Each box hands its work to the next. Change an early step and everything downstream of it is rebuilt.</text>
</svg>
